<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>404 — Page Not Found | Rogon Network</title>
  <meta name="description" content="The page you are looking for could not be found on Rogon Network.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://rogon.network/404.html">

  <!-- Favicons -->
  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/img/logo.png" rel="apple-touch-icon">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="assets/css/main.css" rel="stylesheet">

  <style>
    body { background: var(--color-bg-light); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; }
    .error-card { text-align: center; max-width: 560px; padding: 60px 40px; background: #fff; border-radius: 18px; box-shadow: var(--shadow-xl); }
    .error-code { font-size: 120px; font-weight: 800; color: var(--color-primary); line-height: 1; margin-bottom: 8px; font-family: var(--font-heading); }
    .error-card h1 { font-size: 28px; font-weight: 700; color: var(--color-dark-secondary); margin-bottom: 12px; }
    .error-card p { font-size: 16px; color: var(--color-text-light); margin-bottom: 32px; line-height: 1.7; }
    .btn-home { display: inline-flex; align-items: center; gap: 8px; background: var(--color-primary); color: #fff; padding: 12px 32px; border-radius: var(--radius-full); font-weight: 600; text-decoration: none; transition: background var(--transition-fast); }
    .btn-home:hover { background: var(--color-primary-hover); }
    .error-logo { margin-bottom: 32px; }
    .error-logo img { height: 40px; width: auto; }
    @media (max-width: 480px) { .error-card { padding: 40px 24px; } .error-code { font-size: 80px; } }
  </style>
</head>

<body>

  <div class="error-card">
      <div class="error-logo">
        <a href="/"><img src="assets/img/logo.png" alt="Rogon Network"></a>
      </div>
      <div class="error-code">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has been moved.<br>Let's get you back on track.</p>
      <a href="/" class="btn-home">
        <i class="bi bi-house-door"></i> Back to Home
      </a>
    </div>
  </div>

</body>
</html>
